<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержка — Salaamly</title>
    <style>
        :root {
            --primary: #2c5e50;
            --accent: #d4a373;
            --bg: #fdfdfd;
            --text: #2d3436;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(44, 94, 80, 0.08);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            font-size: 40px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        p { color: #636e72; font-size: 16px; margin-bottom: 25px; line-height: 1.5; }

        .email-box {
            background: #f8f9fa;
            border: 1px dashed #cbd5e0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .email-text {
            display: block;
            font-family: monospace;
            font-size: 16px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .btn-email {
            display: block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(44, 94, 80, 0.2);
        }

        .btn-email:hover { background: #1e4137; }

        .footer-links {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer-links a {
            color: #b2bec3;
            text-decoration: none;
            font-size: 13px;
            margin: 0 10px;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-circle">S</div>
        <h1>Поддержка Salaamly</h1>
        <p>Если у вас возникли вопросы, напишите нам. Мы всегда на связи.</p>
        
        <div class="email-box">
            <span style="font-size: 12px; color: #a0aec0; text-transform: uppercase;">Наш адрес:</span>
            <span class="email-text">support@salaamly.com</span>
        </div>

        <a href="mailto:support@salaamly.com" class="btn-email">Открыть почту</a>

        <div class="footer-links">
            <a href="privacy.html">Конфиденциальность</a>
            <a href="terms.html">Условия</a>
        </div>
    </div>

</body>
</html>
