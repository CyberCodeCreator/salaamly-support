<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержка — Salaamly</title>
    <style>
        :root {
            --primary: #2c5e50; /* Глубокий изумрудный */
            --accent: #d4a373;  /* Песочный */
            --bg: #fdfdfd;
            --text: #2d3436;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(44, 94, 80, 0.08);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            font-size: 40px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }

        h1 { font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        p { color: #636e72; font-size: 16px; margin-bottom: 30px; line-height: 1.5; }

        .btn-email {
            display: block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(44, 94, 80, 0.2);
        }

        .btn-email:active { transform: scale(0.97); }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #b2bec3;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-circle">S</div>
        <h1>Поддержка Salaamly</h1>
        <p>Если у вас возникли вопросы по обучению или работе приложения, напишите нам. Мы ответим вам в ближайшее время.</p>
        
        <a href="mailto:groupforkids@gmail.com" class="btn-email">Написать нам на почту</a>

        <div class="footer">
            &copy; 2026 Salaamly Project<br>
            <small>Помощь • Конфиденциальность</small>
        </div>
    </div>

</body>
</html>
